version: '3.8'

# AgenticStore MCP Tools — Docker Compose
#
# Provides supporting services for the MCP tools.
# The MCP server itself is launched per-connection by your AI client (stdio protocol).
#
# Usage:
#   docker compose up -d            # start all services (searxng + webapp)
#   docker compose down             # stop all services
#   docker compose logs -f          # tail logs
#
# Workflow:
#   1. docker compose up -d
#   2. Open http://localhost:8765 → configure secrets in Connectors tab
#   3. Add the MCP server to your AI client config (Clients tab shows the snippet):
#
#   Claude Desktop / Cursor — add to mcpServers in your client config:
#   {
#     "agentic-store-mcp": {
#       "command": "docker",
#       "args": ["run", "-i", "--rm",
#                "-v", "agentic-store-mcp_agentic-store-memory:/root/.config/agentic-store",
#                "--network", "agentic-store-mcp_default",
#                "-e", "SEARXNG_URL=http://searxng:8080",
#                "agentic-store-mcp"]
#     }
#   }
#
# The volume mount (-v) makes secrets saved in the webapp available to the MCP server.

services:

  # -------------------------------------------------------------------------
  # SearXNG — self-hosted metasearch engine
  # Required by: agentic_web_search tool
  # Docs: https://docs.searxng.org
  # -------------------------------------------------------------------------
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng
    environment:
      - SEARXNG_SECRET=${SEARXNG_SECRET:-please-change-this-secret}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # -------------------------------------------------------------------------
  # Onboarding Webapp — configure connectors, select tools, apply MCP config
  # Opens at: http://localhost:8765
  # Sections: Connectors | Tools | Clients | Agent Orchestration
  # -------------------------------------------------------------------------
  webapp:
    build: .
    container_name: agentic-store-webapp
    entrypoint: ["uv", "run", "webapp.py", "--host", "0.0.0.0", "--port", "8765", "--no-open"]
    ports:
      - "8765:8765"
    volumes:
      # Persist memory, secrets (tokens.json), and checkpoints across restarts
      - agentic-store-memory:/root/.config/agentic-store
    environment:
      # Pass API keys via env vars — secrets.py checks these automatically
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - LINEAR_API_KEY=${LINEAR_API_KEY:-}
      - SEARXNG_URL=http://searxng:8080
    depends_on:
      - searxng
    restart: unless-stopped

# -------------------------------------------------------------------------
# Named volume — persists ~/.config/agentic-store across container restarts:
#   - tokens.json (secrets fallback when keyring unavailable)
#   - memory/ (facts, checkpoints, plan, milestones, learnings, changelog)
# -------------------------------------------------------------------------
volumes:
  agentic-store-memory:
